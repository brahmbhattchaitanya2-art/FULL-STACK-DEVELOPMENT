<!DOCTYPE html>
<html>
<head>
<script>
const changeData = (size, color, text = "Good Morning") => {
  let h = document.getElementById("head");
  h.innerHTML = text;
  h.style.fontSize = size;
  h.style.color = color;

  document.getElementById("img").src = "1.webp";
};
</script>
</head>

<body>
 
<h1 id="head">Hello World</h1>

<img id="img" src="1.jpg" width="200"><br><br>

<button onclick="changeData('30px','red')">
Click Me
</button>

</body>
</html>
