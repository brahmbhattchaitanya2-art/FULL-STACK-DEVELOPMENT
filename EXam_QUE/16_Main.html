<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logout</title>
</head>
<body>

<button onclick="logout()">Logout</button>

<script>
function logout() {
    var choice = confirm("Do you want to logout?");

    if (choice) {
        var feedback = prompt("Enter your feedback:");
        alert("Thanks for your feedback: " + feedback);
    } else {
        alert("Logout cancelled");
    }
    
}
</script>

</body>
</html>
