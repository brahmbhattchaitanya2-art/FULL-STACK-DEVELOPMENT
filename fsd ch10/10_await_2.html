<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<script>

    function pnumber(num){
        return new Promise((resolve)=>{setTimeout(()=>
            {resolve(num*3)},1000);
        })
    }

    async function getnum(){
        for(let i=1;i<=3;i++){
            let ip =prompt("Enter number"+i+":")
            let number =Number(ip)
            let result=await pnumber(number)
            console.log("Triple:",result);
    }
        
    }

    getnum();


</script>


</head>

</body>
</html>
