<!-- string must contain "abe " anywhere in whole using -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        function fun() {
            pat = /abc/i
            u = document.getElementById("t1").value
            if (pat.test(u)) {
                alert("perfect")
            }
            else {
                alert("not perfect")
            }

        }
    </script>
</head>

<body>
    <form action="" name="p1"></form>
    <label for="">abc</label>
    <input type="text" id="t1">
    <input type="submit" onclick="fun()">
</body>

</html>

<!DOCTYPE html>
<html lang="en">

    <title>Document</title>

    <script>
        function fun() {
            pat1 = /[abc]/
            u = document.getElementById("t2").value;
            if (pat1.test(u)) {
                alert("perfect")
            }
            else {
                alert("not perfect")
            }

        }
    </script>
</head>

<body>
    <form action="" name="p1"></form>
    <label for="">[abc]</label>
    <input type="text" id="t2">

</body>

</html>
