<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>


</head>

<body>



    <form class="mt-4">

        <!-- ========================= -->

        <!-- USER INFO (3 Columns)  -->
        <!-- ========================= -->
        <h4>User Information</h4>
        <div class="row">
            <div class="col-md-4">
                <div class="form-floating">
                    <input type="text" class="form-control" placeholder="Enter username" disabled>
                    <label class="fw-bold">Username</label>
                </div>
                <div class="form-text">This field is disabled</div>
            </div>
            <div class="col-md-4">
                <div class="form-floating">
                    <input type="email" class="form-control" placeholder="te">
                    <label class="fw-bold">Email Address</label>
                </div>
                <div class="form-text">We'll never share your email with anyone else.</div>
            </div>
            <div class="col-md-4">
                <label class="form-label" class="fw-bold">User ID (Auto-assigned)</label>
                <input type="text" class="form-control-plaintext" value="IN-001" readonly>
            </div>
        </div>

        <!-- ========================= -->
        <!--  LOCATION               -->
        <!-- ========================= -->
        <h4 class="mt-4">Location</h4>
        <div class="row">
            <div class="col">
                <div class="form-floating">
                    <select class="form-select">
                        <option value="" class="fw-bold">Select your city</option>
                        <option>Ahmedabad</option>
                        <option>Rajkot</option>
                        <option>Bhavnagar</option>
                        <option>Surat</option>
                    </select>
                    <label>City</label>
                </div>

            </div>
        </div>
        <!-- ========================= -->
        <!-- PERSONAL DETAILS       -->
        <!-- ========================= -->
        <h4 class="mt-4">Personal Details</h4>
        <!-- Gender (cannot use floating label) -->

        <div class="row">
            <div class="col-sm-6">
                <label class="form-label fw-bold">Gender</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" value="male">
                    <label class="form-check-label">Male</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" value="female">
                    <label class="form-check-label">Female</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" value="other">
                    <label class="form-check-label">Other</label>
                </div>
            </div>

            <!-- Hobbies (cannot use floating label) -->

            <div class="col-sm-6">
                <label class="form-label fw-bold">Hobbies</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" value="h1">
                    <label class="form-check-label">Reading</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" value="h2">
                    <label class="form-check-label">Traveling</label>
                </div>
            


                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" value="h3">
                    <label class="form-check-label">Photography</label>
                </div>
            </div>
        </div>
        <!-- ========================= -->
        <!--  PREFERENCES            -->
        <!-- ========================= -->
        <h4>Preferences</h4>
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" value="newsletter" checked>
                    <label class="form-check-label">Subscribe to newsletter</label>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <h5 class="mb-1">Satisfaction Level</h5>
                <div class="d-flex justify-content-between mb-1">
                    <span>Very Poor</span>
                    <span>Poor</span>
                    <span>Average</span>
                    <span>Good</span>
                    <span>Excellent</span>
                </div>
                <input type="range" class="form-range" min="1" max="5" step="1">
            </div>
        </div>

        <!-- ========================= -->
        <!-- DONATION               -->
        <!-- ========================= -->
        <h4>Donation</h4>
        <div class="row">
            <div class="col-md-4 mb-3">
                <div class="input-group">
                    <span class="input-group-text">Rs</span>
                    <input type="text" class="form-control" placeholder="Amount">
            

                </div>
            </div>
            <div class="col-md-8 mb-5">
                <div class="input-group">
                    <span class="input-group-text">First and last name</span>
                    <input type="text" class="form-control">
                    <input type="text" class="form-control">
                </div>
            </div>
        </div>
        <!-- ========================= -->
        <!--comments (textarea)-->
        <!-- ========================= -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="form-floating">
                    <textarea class="form-control" id="comments" placeholder="Leave your comments here"
                        style="height: 100px;"></textarea>
                    <label for="comments">Comments</label>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Submit Form</button>

    </form>
    </div>
    


</body>

</html>
