<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

<body>

                <div class="modal-header">
                    <h1 class="modal-title fs-5">Modal1</h1>
                    <button class="btn btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                   </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" data-bs-target="#mo2" data-bs-toggle="modal">Open second Modal</button>

                </div>
            </div>
        </div>
    </div>
</div>

    <div class="modal fade" id="mo2">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">Modal2</h1>
                    <button class="btn btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                   </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" data-bs-target="#mo1" data-bs-toggle="modal">Open first Modal</button>

                </div>
            </div>
        </div>
    </div>
</div>


</body>

</html>
