<body>
    <nav class="navbar navbar-expand-lg bg-primary navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="island.jpg" width="60" height="60" class="d-inline-block "> shop
             </a>
            <button class="navbar-toggler"  type="button" data-bs-toggle="collapse"
            data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto mb-2">
                <li class="nav-item"><a  class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a  class="nav-link" href="#">About </a></li>
            </ul>
        </div>
    </nav>

    <div id="ce" class="carousel slide" data-bs-ride="carousel" data-bs-pause="hover">
        <div class="carousel-indicators">
            <button data-bs-target="#ce" data-bs-slide-to="0" class="active"></button>
             <button data-bs-target="#ce" data-bs-slide-to="1" ></button>
              <button data-bs-target="#ce" data-bs-slide-to="2" ></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active" data-bs-interval="1000">
                <img src="island.jpg" class="d-block w-100 h-75">
            
            </div>

    
            <div class="carousel-item " data-bs-interval="1000">
                <img src="paris.jpg" class="d-block w-100 h-75">
                
            </div>
    
       
            <div class="carousel-item " data-bs-interval="1000">
                <img src="raj.jpg" class="d-block w-100 h-75">
                
            </div>
        </div>
    </div>
    <nav class="fixed-buttom">
        <ul class="pagination pagination-lg justify-content-center">
            <li class="page-item ">
                <a class="page-link" data-bs-target="#ce" data-bs-slide="pre" >previous</a>
            </li> 
            <li class="page-item">
                <button class="page-link " data-bs-target="#ce" data-bs-slide="1" >1</a>
            </li>
            <li class="page-item">
                <button class="page-link" data-bs-target="#ce" data-bs-slide="2">2</a>
            </li>
            <li class="page-item">
                <button class="page-link" data-bs-target="#ce" data-bs-slide="3" >3</a>
            </li>
            <li class="page-item">
                <button class="page-link" data-bs-target="#ce" data-bs-slide="4" >next</a>
            </li>
        </ul>
    </nav>
    
</body>
</html>
