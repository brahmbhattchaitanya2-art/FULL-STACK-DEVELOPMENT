<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <form >
        <h4>User info</h4>
        <div class="col-md-6">
            <div class="form-floating">
                <input type="text" class="form-control" placeholder="Enter name:">
                <label class="fw-bold">Username</label>
            </div>

        </div>
        <div class="col-md-6">
            <div class="form-floating">
                <input type="password" class="form-control" placeholder="Enter Password:">
                <label class="fw-bold">Password</label>
            </div>
        </div>
        
    </form>
    <form action="">

        <h4>Location</h4>
        <div class="col">
            <div class="form-floating">
                <select class="form-select">
                    <option value="" class="fw-bold"> Select City</option>
                    <option value="">Ahmedabad</option>
                    <option value="">Surat</option>

                </select>
                <label for="">City</label>

            </div>
        </div>
    </form>


    <form action="">
        <h4>Personal</h4>
        <div class="row">
            <div class="col-md-6">
                <label class="form-label fw-bold">Gender</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" value="Male" checked>
                    <label class="form-check-label">Male</label>
                </div>


                <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" value="Female">
                    <label class="form-check-label">Female</label>
                </div>
            </div>
        </div>
    </form>
    <form action="">
        <h4>Choice</h4>


        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" value="Male" checked>
            <label class="form-check-label">Male</label>

        </div>

        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" value="Female">
            <label class="form-check-label">Female</label>
        </div>
        </div>
        </div>
    </form>

    <h4>Satisfaction</h4>
    <div class="row">
        <div class="col-md-6">
            <h5>Satisfaction Level</h5>
            <div class="d-flex justify-content-between mb-1">
                <span>Very Good</span>
                <span>Good</span>
                <span>Bad</span>
            </div>
            <input type="range" class="form-range" min="1" max="3" step="1">
        </div>
    </div>




    <form action="">
        <h4>Salary</h4>
        <div class="row">
            <div class="col-md-6">
                <div class="input-group">
                    <span class="input-group-text">Rs</span>
                    <input type="text" class="form-control"  placeholder="money">
                </div>
                <div class="input-group">
                    <span class="input-group-text">https://</span>
                    <input type="text" class="form-control">
                    <span class="input-group-text">.uk</span>
                </div>
                <div class="input-group">
                    <input type="text" class="form-control">
                    <span class="input-group-text">@</span>
                    <input type="text" class="form-control">

                    <span class="input-group-text">.com</span>
                </div>
            </div>
        </div>
    </form>


</body>

</html>
