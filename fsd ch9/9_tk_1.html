<!DOCTYPE html>
<html lang="en">

    </script>
</head>
<body>

<label for="">UpperCase</label>
    <input type="text" onchange="this.value=this.value.toUpperCase()">
    <label for="">Change Bg Txt color/</label>
    <input type="text" onfocus="this.style.backgroundColor='yellow'";  oninput="this.style.color='blue'">

    <input type="text" onblur="this.value=this.value.toLowerCase()">
    
</body>
