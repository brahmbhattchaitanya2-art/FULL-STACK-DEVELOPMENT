<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <script>

        function f1(id)
        {
            id.style.backgroundColor="red";

        }

        function f2(id)
        {
            id.style.backgroundColor="green";
            
        }

        function mover(e){ e.innerHTML="thankyou"
       e.style.color="yellow"}

      function mout(e){e.innerHTML="over" 
      e.style.color="red"; }

    </script>
    

   
</head>
<body  onclick="f1(this)"  onclick="f2(this)">

<button onclick="f1(this)">Red</button>
