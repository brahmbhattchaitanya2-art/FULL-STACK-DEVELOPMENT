<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form onsubmit="stop(event)">
        <input type="submit" value="submit">

    </form>
    <script>
        function stop (e){
            e.preventDefault();
            alert("submission stopped")
        }
    </script>
</body>
</html>
