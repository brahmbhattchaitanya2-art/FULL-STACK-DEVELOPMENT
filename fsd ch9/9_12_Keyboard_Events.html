<!-- Example: Write Html/js to perform the task as asked below. 
Background color should turn red while key is down and it should turn blue 
while key is up.  -->




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function f1(id)
        {
            id.bgColor="blue";

        }

        function f2(id)
        {
            id.bgColor="red";
            
        }
    </script>

</head>
<body onkeyup="f1(this)" onkeydown="f2(this)">
   


    
</body>
</html>
