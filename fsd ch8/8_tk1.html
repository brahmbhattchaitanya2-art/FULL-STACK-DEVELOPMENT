
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        //PROMPT


        function getval() {
          var res1=prompt("Enter your name");
           
            document.write("you entered"+res1);

            {
           res=confirm("Do you want to continue?");
           if(res==true)
           {
            alert(`Hello${res1}! You choose continue`)
           
           }
           else
           alert(`Hello${res1}! You cancelled the operation`)
        

        }
    
 
    }

        
    </script>
</head>

<body>
    <input type="button" value="Click" onclick="getval()">
   
</body>

</html>
