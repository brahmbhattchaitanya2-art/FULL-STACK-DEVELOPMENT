    <script>
        // if statement
        let x = 20
        if (x % 2 == 0) {
            console.log("even")
        }

        // if else statement

        let age = 16
        if (age >= 18) {
            console.log("Allowed")
        }
        else {
            console.log("Not Allowed ")


        }

        // else.if statement
        let score = 82
        if (score >= 90) {
            console.log("A");
        }

        else if (score >= 75) {
            console.log("B");
        }

        else {
            console.log("C");
        }





    </script>
