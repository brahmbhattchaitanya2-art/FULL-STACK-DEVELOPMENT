<html lang="en">
<head>

        .display{display:flex;}

        .box3 {
  height: 300px;

   background: conic-gradient(red 0deg, red 90deg, yellow 90deg, yellow 180deg, pink 180deg, pink 270deg, blue 270deg);

             .box4{
                 height: 300px;

            }
          
        

        .box6{
            height: 300px;
                    width: 300px;
         background: conic-gradient(from 90deg,red,yellow,green) ;

     <div class="box4 display">conic4</div>&nbsp;
