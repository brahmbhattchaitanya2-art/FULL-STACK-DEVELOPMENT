<!DOCTYPE html>
<html lang="en">
<head>
    <style>
         /* body{background-color:red;padding: 40px; };  */
        .box{width: 200px;height: 120px;border: 15px solid rgba(0,0,0,0.4);
        padding: 20px;margin: 30px;color: black;font-size: 18px; background-color: blue;}
        .border-box{background-clip: border-box;}
        .padding-box{background-clip: padding-box;}
        .content-box{background-clip: content-box;}

        </style>
</head>
<body>
    <div class="box border-box">border box
    </div>
    <div class="box padding-box">padding box
    </div>
    <div class="box content-box">contant box
    </div>
</body>
</html>
