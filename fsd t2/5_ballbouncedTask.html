<!DOCTYPE html>
<html lang="en">
<head>
<style>
@keyframes bounce {
  0%, 100% { top: 0; }
  50% { top: 300px; }
}
</style>
</head>
<body>
    <div style="display:flex; justify-content:center; height:100vh; align-items:flex-start;">
  <div style="
    width:50px;
    height:50px;
    background:red;
    border-radius:50%;
    position:relative;
    animation:bounce 2s infinite ease-in-out;">
  </div>
</div>
</body>
</html>
