<!-- i)ease:start slow ,speedup then slow down
ii)easein:st slow then speed up
iii)easeout: st fast then slow down
iv) ease-in-out:start and slow -->




<!DOCTYPE html>
<html lang="en">
<head>
    <style>
div{
    
    width: 100px;
    height: 100px;
   background-color: red;
   transition: width 5s ease-in 1s,height 6s ease-out 0.5s;
   /* background-color: 7s ease-in-out 2s; */

}
div:hover{width: 200px;
height: 200px;
background-color: yellow;}
