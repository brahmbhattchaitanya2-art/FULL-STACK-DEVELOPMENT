<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        :root {
            --b: blue;
            --all: solid dashed double dotted;
            --p20: 20px
        }

        p {
            --c: center;
            --b: brown;
            border-style: var(--all);
            padding: var(--p20);
            border-color: var(--b);
        }

        h1 {
            color: var(--b);
            text-align: var(--c);
        }
    </style>

<body>
    <h1>Hello</h1>
    <p>Good</p>
</body>

</html>
