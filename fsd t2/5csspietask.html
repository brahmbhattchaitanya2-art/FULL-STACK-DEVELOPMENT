<!-- create one pie chart circle gradients st at 90deg circle divide into  angular section based on specfied 
col red (0to45) green(45 to 90) blue 90 to 180 yellow 180 to 315 pink 315 to 360 -->

<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .box{height: 200px;
            width: 200px;
            border-radius: 50%;
            background: conic-gradient(from 90deg, red 0deg ,red 45deg,green 45deg,
            green 90deg,blue 90deg ,blue 180deg ,yellow 180deg,yellow 315deg,
             pink 315deg, pink 360deg );
            
        }
    </style>
</head>
<body>
    <div class="box"> pie</div>
</body>
</html>
